<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeanOS | Live CD</title>
    <link rel="preload"
      href="../fonts/JetBrainsMono-Regular.woff2"
      as="font" type="font/woff2" crossorigin>
    <style>
        @font-face {
            font-family: "JetBrains Mono";
            src: url("../fonts/JetBrainsMono-Regular.woff2") format("woff2");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #232834;
            color: #e0e6ed;
            font-family: "JetBrains Mono", monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #262b38;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        header h1 {
            font-size: 1.5rem;
            color: #fff;
        }

        header a {
            color: #7dd3fc;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        header a:hover {
            color: #38bdf8;
            text-decoration: underline;
        }

        .emulator-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            width: 100%;
            max-width: 1000px;
        }

        .emulator-wrapper p {
            color: #b0b8c9;
            margin-bottom: 1.5rem;
            text-align: center;
            line-height: 1.6;
        }

        #screen_container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            outline: none;
        }

        #screen_container div {
            white-space: pre;
            font: 14px 'JetBrains Mono', monospace;
            line-height: 14px;
            color: #c0c0c0;
        }

        #screen_container canvas {
            display: none;
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
        }

        .controls button {
            background: #31384a;
            color: #e0e6ed;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-family: "JetBrains Mono", monospace;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .controls button:hover {
            background: #3a4152;
            transform: translateY(-2px);
        }

        #status {
            margin-top: 1rem;
            color: #7a8194;
            font-size: 0.9rem;
        }

        .links {
            margin-top: 1rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .links a {
            color: #7dd3fc;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #38bdf8;
            text-decoration: underline;
        }

        .version-label {
            color: #b0b8c9;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>DeanOS</h1>
        <a href="../">&larr; Back to Portfolio</a>
    </header>

    <div class="emulator-wrapper">
        <p>
            A hobby operating system built from scratch.<br>
            Click <strong>Start</strong> to boot DeanOS in your browser using the
            <a href="https://github.com/TheEvalon/x86" target="_blank">v86</a> x86 emulator.
        </p>

        <div id="screen_container" tabindex="0">
            <div style="white-space: pre; font: 14px monospace; line-height: 14px; color: #c0c0c0; padding: 20px;">
V86 Emulator Ready

Press Start to boot DeanOS.
            </div>
            <canvas style="display: none"></canvas>
        </div>

        <div class="controls">
            <button id="start-btn">▶ Start</button>
            <button id="restart-btn" disabled>↻ Restart</button>
        </div>

        <div id="status">Ready</div>

        <div class="links">
            <span id="version-label" class="version-label">Version loading...</span>
            <a id="download-btn" href="deanos.iso" target="_blank" rel="noopener">Download Latest ISO</a>
            <a href="https://github.com/adel051700/deanos" target="_blank">View Source on GitHub</a>
        </div>
    </div>

    <!-- v86 from https://github.com/TheEvalon/x86 -->
    <script src="build/libv86.js"></script>
    <script>
        const startBtn   = document.getElementById("start-btn");
        const restartBtn = document.getElementById("restart-btn");
        const status     = document.getElementById("status");
        const downloadBtn = document.getElementById("download-btn");
        const versionLabel = document.getElementById("version-label");

        // Public Supabase URL + anon key are safe for frontend use with proper RLS.
        const SUPABASE_URL = "https://caimogubvdogzubilvfy.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhaW1vZ3VidmRvZ3p1YmlsdmZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNzkyNDUsImV4cCI6MjA4Mjk1NTI0NX0.eBddkUffZzNeV5cZokDODmKcxHq-j5fmIOfvqje1RFI";

        let currentIsoUrl = "deanos.iso";
        let emulator     = null;

        async function getLatestISO() {
            try {
                const latestReleaseUrl = new URL(`${SUPABASE_URL}/rest/v1/os_releases`);
                latestReleaseUrl.search = new URLSearchParams({
                    apikey: SUPABASE_ANON_KEY,
                    is_latest: "eq.true",
                    select: "iso_url,version",
                    limit: "1",
                }).toString();

                const res = await fetch(latestReleaseUrl.toString());

                if (!res.ok) {
                    throw new Error(`Supabase request failed (${res.status})`);
                }

                const releases = await res.json();
                const release = Array.isArray(releases) ? releases[0] : null;

                if (release && release.iso_url) {
                    currentIsoUrl = release.iso_url;
                    downloadBtn.href = release.iso_url;
                    versionLabel.textContent = release.version
                        ? `Version: ${release.version}`
                        : "Version latest";
                    return;
                }

                versionLabel.textContent = "Version unavailable";
            } catch (err) {
                console.error("Failed to load latest ISO metadata:", err);
                versionLabel.textContent = "Version unavailable";
            }
        }

        function boot() {
            status.textContent = "Loading ISO…";
            startBtn.disabled  = true;
            startBtn.blur();

            if (emulator) {
                emulator.destroy();
            }

            fetch(currentIsoUrl)
                .then(function(resp) { return resp.arrayBuffer(); })
                .then(function(isoBuffer) {
                    status.textContent = "Booting…";

                    emulator = new V86({
                        wasm_path:        "build/v86.wasm",
                        memory_size:      64 * 1024 * 1024,
                        vga_memory_size:  8 * 1024 * 1024,
                        screen_container: document.getElementById("screen_container"),
                        bios: {
                            url: "build/seabios.bin",
                        },
                        vga_bios: {
                            url: "build/vgabios.bin",
                        },
                        cdrom: {
                            buffer: isoBuffer,
                        },
                        boot_order: 0x100,
                        autostart: true,
                    });

                    emulator.add_listener("emulator-ready", function () {
                        status.textContent  = "Running";
                        restartBtn.disabled = false;
                        document.getElementById("screen_container").focus();
                    });

                    emulator.add_listener("emulator-loaded", function () {
                        status.textContent  = "Running";
                        restartBtn.disabled = false;
                        document.getElementById("screen_container").focus();
                    });

                    setTimeout(function () {
                        if (status.textContent === "Booting…") {
                            status.textContent  = "Running";
                            restartBtn.disabled = false;
                        }
                    }, 3000);
                })
                .catch(function(err) {
                    status.textContent = "Error: " + err.message;
                    startBtn.disabled = false;
                });
        }

            getLatestISO();

        const screenContainer = document.getElementById("screen_container");

        screenContainer.addEventListener("click", function () {
            if (emulator) {
                screenContainer.requestPointerLock();
            }
        });

        document.addEventListener("pointerlockchange", function () {
            if (document.pointerLockElement === screenContainer) {
                status.textContent = "Running \u2014 mouse captured (press Esc to release)";
                screenContainer.style.cursor = "none";
            } else {
                if (status.textContent.includes("mouse captured")) {
                    status.textContent = "Running";
                }
                screenContainer.style.cursor = "";
            }
        });

        startBtn.addEventListener("click", boot);
        restartBtn.addEventListener("click", function () {
            status.textContent = "Restarting…";
            restartBtn.blur();
            emulator.restart();
            setTimeout(function () {
                status.textContent = "Running";
                document.getElementById("screen_container").focus();
            }, 1000);
        });
    </script>
    <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "7b6d08ca2a104f7588c6188eec7a46ab"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
